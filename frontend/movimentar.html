<!DOCTYPE html>
<html>
<head>
<title>MovimentańŃo</title>
</head>
<body>

<h2>Movimentar Estoque</h2>

SKU <input id="sku" autofocus><br>
Corredor <input id="corredor"><br>

<select id="tipo">
<option value="ENTRADA">Entrada</option>
<option value="SAIDA">Saida</option>
</select>

Quantidade <input id="quantidade" value="1" type="number">

<button onclick="mov()">Enviar</button>
<button onclick="sair()">Sair</button>

<p id="res"></p>

<script>
const API="http://localhost:7007"

function token(){
return localStorage.getItem("token")
}

function sair(){
localStorage.removeItem("token")
window.location="../index.html"
}

function irPrimeiroAcesso(){
window.location="primeiro-acesso.html"
}

if(!token()){
window.location="../index.html"
}

async function mov(){

const r=await fetch(`${API}/movimentar`,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":`Bearer ${token()}`
},
body:JSON.stringify({
sku:document.getElementById("sku").value,
corredor:document.getElementById("corredor").value,
tipo:document.getElementById("tipo").value,
quantidade:parseInt(document.getElementById("quantidade").value)
})
})

if(r.status===401){
sair()
return
}

const d=await r.json()
if(r.status===403 && d.detail==="troca de senha obrigatoria"){
irPrimeiroAcesso()
return
}

document.getElementById("res").innerText=d.msg||d.detail||JSON.stringify(d)

}

document.getElementById("sku").addEventListener("keypress",function(e){
if(e.key==="Enter"){mov()}
})
</script>

</body>
</html>
