<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primeiro Acesso - Troca de Senha</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 520px;">
<div class="card">
<div class="card-body">
<h4 class="mb-3">Troca obrigatória de senha</h4>
<p class="text-muted">Para continuar, troque sua senha de acesso inicial.</p>

<div class="mb-2">
<label class="form-label" for="senha_atual">Senha atual</label>
<input id="senha_atual" type="password" class="form-control">
</div>

<div class="mb-3">
<label class="form-label" for="nova_senha">Nova senha</label>
<input id="nova_senha" type="password" class="form-control" placeholder="Mínimo de 8 caracteres">
</div>

<button id="btn-trocar" class="btn btn-primary" type="button">Salvar nova senha</button>
<button id="btn-sair" class="btn btn-outline-secondary ms-2" type="button">Sair</button>
<p id="res" class="mt-3 mb-0"></p>
</div>
</div>
</div>
<script src="js/primeiro-acesso.js"></script>
</body>
</html>
