<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dash.css">
    <script defer src="dash.js"></script>
    <title>Document</title>
</head>
<body>
    <div id="header-nav" class="hidden">
                <h1 class="mb-0">Dashboard Estoque</h1>
                <div id="userName-exit">
                    <span id="usuario-logado" class="me-3 text-muted">Gustavo</span>
                    <button id="btn-sair" class="btn btn-outline-secondary btn-sm" type="button">Sair</button>
                </div>
    </div>
    <main>
        <div id="tela-app" class="hidden">

            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <label for="dias" class="form-label" id="days-count">Período (dias)</label>
                    <select id="dias" class="form-select">
                        <option value="7">Ultimos 7 dias</option>
                        <option value="15">Ultimos 15 dias</option>
                        <option value="30" selected>Ultimos 30 dias</option>
                        <option value="90">Ultimos 90 dias</option>
                    </select>
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6 mov-info">
                <div class="card ">
                    <div class="card-body">
                    <h3>Total Produtos</h3>
                    <h2 id="produtos">0</h2>
                    </div>
                </div>
                </div>
                <div class="col-md-6 mov-info">
                <div class="card">
                    <div class="card-body">
                    <h3>Movimentaçoes</h3>
                    <h2 id="mov">0</h2>
                    </div>
                </div>
                </div>
            </div>

            <div class="mb-3">
                <div class="card-grafico">
                <h6>Movimentaçoes no periodo</h6>
                <canvas id="graficoMovimentacoes" height="350" width="700"></canvas>
                </div>
            </div>

            <div class="card">
                <div class="card-mov-estoque">
                    <h6>Movimentar Estoque</h6>
                    <div class="row g-2">
                        <div class="col-md-3">
                            <input id="m_sku" class="form-control" placeholder="SKU">
                        </div>
                        <div class="col-md-3">
                            <input id="m_corredor" class="form-control" placeholder="Corredor">
                        </div>
                        <div class="col-md-2">
                            <select id="m_tipo" class="form-select">
                                <option value="ENTRADA">Entrada</option>
                                <option value="SAIDA">Saida</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <input id="m_qtd" type="number" class="form-control" value="1" min="1">
                        </div>
                        <div class="col-md-2">
                            <button id="btn-mov" class="btn btn-primary w-100" type="button">Enviar</button>
                        </div>
                    </div>
                    <p id="mov-res" class="mt-2 mb-0"></p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
