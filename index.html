<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="Login/style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <title>Stillus Home - Controle de Estoque</title>
</head>
<body>
  <div id="notificacao-wrapper" class="hidden">
    <button id="btn-notificacao" type="button" title="Notificaçoes">&#128276;
      <span id="notificacao-badge">0</span>
    </button>
    <div id="painel-notificacoes"></div>
  </div>

  <div class="container py-4" style="max-width: 1100px;">
    <div id="tela-login" class="card">
      <div class="card-body" style="max-width: 460px; margin: 0 auto;">
        <h3 class="mb-2">Stillus Home</h3>
        <p class="text-muted">Controle de Estoque</p>
        <input id="email" class="form-control mb-2" placeholder="Email">
        <input id="senha" type="password" class="form-control mb-3" placeholder="Senha">
        <button id="btn-login" class="btn btn-primary w-100" type="button">Entrar</button>
        <a href="Login/trocasenha.html">tela de trocar senha</a>
        <p id="login-res" class="mt-2 mb-0 text-danger"></p>
      </div>
    </div>

    

    <div id="tela-app" class="hidden">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="mb-0">Dashboard Estoque</h1>
        <div>
          <span id="usuario-logado" class="me-3 text-muted"></span>
          <button id="btn-sair" class="btn btn-outline-secondary btn-sm" type="button">Sair</button>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <label for="dias" class="form-label">Período (dias)</label>
          <select id="dias" class="form-select">
            <option value="7">Ultimos 7 dias</option>
            <option value="15">Ultimos 15 dias</option>
            <option value="30" selected>Ultimos 30 dias</option>
            <option value="90">Ultimos 90 dias</option>
          </select>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <div class="card">
            <div class="card-body">
              <h6>Total Produtos</h6>
              <h2 id="produtos">0</h2>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card">
            <div class="card-body">
              <h6>Movimentaçoes</h6>
              <h2 id="mov">0</h2>
            </div>
          </div>
        </div>
      </div>

      <div class="card mb-3">
        <div class="card-body">
          <h6>Movimentaçoes no periodo</h6>
          <canvas id="graficoMovimentacoes" height="100"></canvas>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <h6>Movimentar Estoque</h6>
          <div class="row g-2">
            <div class="col-md-3">
              <input id="m_sku" class="form-control" placeholder="SKU">
            </div>
            <div class="col-md-3">
              <input id="m_corredor" class="form-control" placeholder="Corredor">
            </div>
            <div class="col-md-2">
              <select id="m_tipo" class="form-select">
                <option value="ENTRADA">Entrada</option>
                <option value="SAIDA">Saida</option>
              </select>
            </div>
            <div class="col-md-2">
              <input id="m_qtd" type="number" class="form-control" value="1" min="1">
            </div>
            <div class="col-md-2">
              <button id="btn-mov" class="btn btn-primary w-100" type="button">Enviar</button>
            </div>
          </div>
          <p id="mov-res" class="mt-2 mb-0"></p>
        </div>
      </div>
    </div>
  </div>

  <div id="popup-alerta">
    <div id="popup-conteudo">
      <h4 class="mb-3" id="popup-titulo">Atençao: estoque baixo</h4>
      <div id="popup-mensagem" class="mb-3"></div>
      <button class="btn btn-primary" id="fechar-popup" type="button">Fechar</button>
    </div>
  </div>
</body>
</html>
