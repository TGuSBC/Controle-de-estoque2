<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="troca.css">
    
    <title>Document</title>
</head>
<body>
    <main>
        <div id="tela-primeiro-acesso" class="card hidden">
            <div class="card-body" style="max-width: 520px; margin: 0 auto;">
                <h4 class="mb-2">Troca obrigatória de senha</h4>
                <p class="text-muted">Troque sua senha inicial para continuar.</p>
                <input id="senha_atual" type="password" class="form-control mb-2" placeholder="Senha atual">
                <input id="nova_senha" type="password" class="form-control mb-3" placeholder="Nova senha (min. 8)">
                <button id="btn-trocar-senha" class="btn btn-primary" type="button">Salvar nova senha</button>
                <button id="btn-sair-1" class="btn nd-btn btn-outline-secondary ms-2" type="button">Sair</button>
                <p id="troca-res" class="mt-2 mb-0"></p>
            </div>
        </div>
    </main>
</body>
</html>
