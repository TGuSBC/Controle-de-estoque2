<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/assets/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="api.js" defer></script>
    <script src="ui.js" defer></script>

    <title>Stillus Home - Controle de Estoque</title>  
</head>
    <body>
        <nav class="navbar navbar-dark bg-dark">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1">Stillus Home - Controle de Estoque</span>
                <span class="navbar-exit">Sair</span>
            </div>
        </nav>
        <div class="container">
            <ul class="nav nav-tabs mb-4">
                <li class="nav-item"><button class="nav-link active" onclick="showTab('dashboard')">Dashboard</button></li>
                <li class="nav-item"><button class="nav-link" onclick="showTab('entrada')">Entrada</button></li>
                <li class="nav-item"><button class="nav-link" onclick="showTab('saida')">Saída</button></li>
                <li class="nav-item"><button class="nav-link" onclick="showTab('produtos')">Produtos</button></li>
            </ul>

            <div class="area-genr">
                    <div id="dashboard" class="tab active">
                    <div class="row">
                        <div class="col">
                            <div class="card">
                                <div class="card-body">
                                    <h5>Total Produtos</h5>
                                    <h2 id="total_produtos">-</h2>
                                </div>
                            </div>
                        </div>
                        <div class="col">
                            <div class="card">
                                <div class="card-body">
                                    <h5>Total Movimentações</h5>
                                    <h2 id="total_mov">-</h2>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="loadDashboard()">Atualizar</button>
                </div>

                <div id="entrada" class="tab">
                    <h3>Registrar Entrada</h3>
                    <input id="e_sku" class="form-control mb-2" placeholder="SKU">
                    <input id="e_corredor" class="form-control mb-2" placeholder="Corredor">
                    <input id="e_qtd" class="form-control mb-2" placeholder="Quantidade">
                    <button class="btn btn-success" onclick="entrada()">Registrar</button>
                </div>

                <div id="saida" class="tab">
                    <h3>Registrar Saída</h3>
                    <input id="s_sku" class="form-control mb-2" placeholder="SKU">
                    <input id="s_corredor" class="form-control mb-2" placeholder="Corredor">
                    <input id="s_qtd" class="form-control mb-2" placeholder="Quantidade">
                    <button class="btn btn-danger" onclick="saida()">Registrar</button>
                </div>

                <div id="produtos" class="tab">
                    <h3>Cadastrar Produto</h3>
                    <input id="p_nome" class="form-control mb-2" placeholder="Nome">
                    <input id="p_sku" class="form-control mb-2" placeholder="SKU">
                    <button class="btn btn-primary" onclick="produto()">Cadastrar</button>
                </div>
            </div>
            
        </div>
</body>
</html>
